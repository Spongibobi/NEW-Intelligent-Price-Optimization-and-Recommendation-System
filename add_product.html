{% extends "layout.html" %}

{% block content %}
<section class="dashboard">
    <h1>Add Product</h1>

    <form class="card search-card" method="POST">
        <label>Product Name</label>
        <input type="text" name="product_name" required>

        <label>Brand</label>
        <input type="text" name="brand" placeholder="Dell, HP, Lenovo..." required>

        <label>Website</label>
        <input type="text" name="website" placeholder="Amazon, eBay..." required>

        <label>Price in OMR</label>
        <input type="number" step="0.001" name="price" required>

        <label>Warranty Years</label>
        <input type="number" min="0" name="warranty" required>

        <label>Rating</label>
        <input type="number" min="1" max="5" name="rating" required>

        <label>Sales</label>
        <input type="number" min="0" name="sales" required>

        <label>Image URL</label>
        <input type="url" name="image_url" required>

        <label>Purchase Link</label>
        <input type="url" name="product_url" required>

        <button type="submit">Add Product</button>
    </form>
</section>
{% endblock %}
