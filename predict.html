{% extends "layout.html" %}

{% block content %}

<section class="dashboard">

    <h1>Demand Prediction</h1>

    <div class="card wide-card">
         
        <div class="tabs">
         <a href="{{ url_for('seller') }}">Seller Dashboard</a>
         <a class="active" href="{{ url_for('predict') }}">Demand Prediction</a>
       
    </div>

        <form method="POST">

            <input
                type="text"
                name="product"
                placeholder="Enter product name"
                required>

            <button type="submit">
                Predict Demand
            </button>

        </form>

        {% if result %}

        <hr>

        <h2>{{ result.product }}</h2>

        <p>
            Total Searches:
            <strong>{{ result.searches }}</strong>
        </p>

        <p>
            Popularity Score:
            <strong>{{ result.score }}%</strong>
        </p>

        <p>
            Demand Level:
            <strong>{{ result.level }}</strong>
        </p>

        {% endif %}

    </div>

</section>

{% endblock %}
